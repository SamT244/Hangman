<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Hangman</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 30px;
        }
        #wordDisplay {
            font-size: 2em;
            letter-spacing: 10px;
            margin: 20px 0;
        }
        input {
            font-size: 1em;
            padding: 5px;
            width: 50px;
            text-align: center;
        }
        #message {
            margin-top: 20px;
            font-size: 1.2em;
            color: red;
        }
        button {
            margin-top: 20px;
            padding: 10px 15px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Hangman Game</h1>
    <p>Type a letter and press Enter to guess!</p>
        <select id="words">
        <option value="Hangman">Hangman</option>
        <option value="Javascript">Javascript</option>
        <option value="game">game</option>
        </select>
    <div>
        <p>Wrong guesses: <span id="wrongGuesses">0</span></p>
    </div>
    <div id="wordDisplay"></div>
    <input type="text" id="letterInput" maxlength="1">
    <div id="message"></div>
    <button id="restartBtn">Quit / Restart</button>

    <script>
        const words = ["javascript", "hangman", "game"];
        let selectedWord;
        let guessedLetters;
        let wrongGuesses;
        const maxWrong = 6;

        const wordDisplay = document.getElementById("wordDisplay");
        const input = document.getElementById("letterInput");
        const message = document.getElementById("message");
        const restartBtn = document.getElementById("restartBtn");
        const wordSelect = document.getElementById("words");
        
        const wrongGuessesDisplay = document.getElementById("wrongGuesses");

        wordSelect.addEventListener("change", function() {
            selectedWord = this.value.toLowerCase();
            startGame();
        });

        function startGame() {
            guessedLetters = [];
            wrongGuesses = 0;
            input.disabled = false;
            input.value = "";
            message.textContent = "";
            updateWordDisplay();
        }

        function updateWordDisplay() {
            wordDisplay.textContent = selectedWord
                .split("")
                .map(letter => guessedLetters.includes(letter) ? letter : "_")
                .join(" ");
        }

        function checkGame() {
            if (selectedWord.split("").every(letter => guessedLetters.includes(letter))) {
                wrongGuesses = 0;
                wrongGuessesDisplay.textContent = wrongGuesses;
                message.textContent = "🎉 You Win!";
                input.disabled = true;
            } else if (wrongGuesses >= maxWrong) {
                wrongGuesses = 0;
                wrongGuessesDisplay.textContent = wrongGuesses;
                message.textContent = `☠️ You Lose! The word was "${selectedWord}".`;
                wordDisplay.textContent = selectedWord.split("").join(" ");
                input.disabled = true;
            }
        }

        input.addEventListener("keyup", function(event) {
            
            if (event.key === "Enter") {
                const letter = input.value.toLowerCase();
                input.value = "";
                if (letter && !guessedLetters.includes(letter)) {
                    if (selectedWord.includes(letter)) {
                        guessedLetters.push(letter);
                    } else {
                        wrongGuesses++;
                        wrongGuessesDisplay.textContent = wrongGuesses;
                    }
                    updateWordDisplay();
                    checkGame();
                }
            }
        });

        wordSelect.addEventListener("change", function() {
            selectedWord = this.value.toLowerCase();
            startGame();
        });

        restartBtn.addEventListener("click", startGame);

        // Start the first game
        startGame();
    </script>
</body>
</html>
